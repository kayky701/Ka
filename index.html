<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Verificação de Segurança</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url(https://imgur.com/NCrRm4r) no-repeat center center;
background-size: cover;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 400px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    margin: 10px;
    font-size: 18px;
    cursor: pointer;
}

#sim {
    background: #ff4d6d;
    color: white;
}

#nao {
    background: #999;
    color: white;
    position: absolute;
}

.hidden {
    display: none;
}

h1 {
    font-size: 24px;
}
</style>
</head>

<body>

<div class="container" id="fake">
    <h1>🔐 Verificação de Segurança</h1>
    <p>Digite a senha para continuar</p>
    <input type="password" id="senha">
    <br><br>
    <button onclick="verificar()">Entrar</button>
</div>

<div class="container hidden" id="pedido">
    <h1>💖 Quer namorar comigo? 💖</h1>
    <button id="sim" onclick="aceitou()">SIM ❤️</button>
    <button id="nao">NÃO 😢</button>
</div>

<audio id="musica" loop>
    <source src="https://www.myinstants.com/media/sounds/perfect-ed-sheeran.mp3" type="audio/mpeg">
</audio>

<script>
function verificar() {
    let senha = document.getElementById("senha").value;

    if (senha === "1234") {
        document.getElementById("fake").classList.add("hidden");
        document.getElementById("pedido").classList.remove("hidden");

        document.body.addEventListener("click", function () {
            document.getElementById("musica").play();
        }, { once: true });

    } else {
        alert("Senha errada 😶");
    }
}

let nao = document.getElementById("nao");

document.addEventListener("mousemove", function(e) {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    nao.style.left = x + "px";
    nao.style.top = y + "px";
});

function aceitou() {
    document.body.innerHTML = "<h1>AGORA ESTAMOS OFICIALMENTE NAMORANDO 💖🥰</h1>";

    setInterval(() => {
        let coracao = document.createElement("div");
        coracao.innerHTML = "❤️";
        coracao.style.position = "absolute";
        coracao.style.left = Math.random() * 100 + "vw";
        coracao.style.top = "100vh";
        coracao.style.fontSize = "24px";

        document.body.appendChild(coracao);

        let subir = setInterval(() => {
            coracao.style.top = (parseInt(coracao.style.top) - 2) + "px";
        }, 20);

        setTimeout(() => {
            clearInterval(subir);
            coracao.remove();
        }, 3000);

    }, 200);
}
</script>

</body>
</html>
