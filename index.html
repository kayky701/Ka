<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido Especial ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }.container {
  background: rgba(0,0,0,0.3);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

button {
  padding: 15px 25px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background-color: #4CAF50;
  color: white;
}

.no {
  background-color: #f44336;
  color: white;
  position: absolute;
}

button:hover {
  transform: scale(1.1);
}

#message {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
  display: none;
}

  </style>
</head>
<body>
  <div class="container">
    <h1>Quer namorar comigo? ❤️</h1>
    <button class="yes" onclick="aceitou()">Sim</button>
    <button class="no" onmouseover="foge(this)">Não</button><div id="message">Agora estamos oficialmente namorando ❤️🥰</div>

  </div>  <script>
    function aceitou() {
      document.getElementById('message').style.display = 'block';
    }

    function foge(btn) {
      const x = Math.random() * (window.innerWidth - btn.offsetWidth);
      const y = Math.random() * (window.innerHeight - btn.offsetHeight);
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
    }
  </script></body>
</html>
